version: 0.1
cli:
  version: 1.25.0
repo:
  repo:
    host: github.com
    owner: z-shell
    name: zsh
lint:
  disabled:
    - trufflehog
    - checkov
  enabled:
    - git-diff-check
    - yamllint@1.38.0
    - actionlint@1.7.12
    - gitleaks@8.30.1
    - markdownlint@0.48.0
    - prettier@3.8.3
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
